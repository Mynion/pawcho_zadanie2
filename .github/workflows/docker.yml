name: Build Scan and Push

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug token length
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | wc -c

      - name: Show token first chars
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | cut -c1-12

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: local-scan:latest
          cache-from: type=registry,ref=docker.io/mynion/cache:buildcache
          cache-to: type=registry,ref=docker.io/mynion/cache:buildcache,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local-scan:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mynion/pawcho_zadanie2:latest
            ghcr.io/mynion/pawcho_zadanie2:${{ github.sha }}
          cache-from: type=registry,ref=docker.io/mynion/cache:buildcache
          cache-to: type=registry,ref=docker.io/mynion/cache:buildcache,mode=max