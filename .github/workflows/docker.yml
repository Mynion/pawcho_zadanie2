name: Build Scan and Push

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: local-scan:latest
          cache-from: type=registry,ref=docker.io/mynion/cache:buildcache
          cache-to: type=registry,ref=docker.io/mynion/cache:buildcache,mode=max,inline=true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local-scan:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Show scan summary (on failure)
        if: failure()
        run: echo "Vulnerabilities detected - build stopped"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mynion/pawcho_zadanie2:latest
            ghcr.io/mynion/pawcho_zadanie2:${{ github.sha }}
            ghcr.io/mynion/pawcho_zadanie2:1.0.${{ github.run_number }}
          cache-from: type=registry,ref=docker.io/mynion/cache:buildcache
          cache-to: type=registry,ref=docker.io/mynion/cache:buildcache,mode=max,inline=true

      - name: Smoke test container
        run: |
          docker run -d --name test -p 8080:8080 ghcr.io/mynion/pawcho_zadanie2:latest
          sleep 5
          curl --fail http://localhost:8080 || (docker logs test && exit 1)
          docker stop test
